name: Congress Copy

# Runs the congress-copy bot: scrapes new Gottheimer disclosures, places
# copy trades, and runs the stop-loss monitor on existing copy positions.
#
# Triggered exclusively by cron-job.org via workflow_dispatch.
# See tsla-monitor.yml for context on why we dropped the GitHub-native
# `schedule:` trigger.

on:
  workflow_dispatch: {}

concurrency:
  group: bot-commits
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: congress-copy
        run: pip install -r requirements.txt

      - name: Run disclosures cycle (new trades + copy)
        working-directory: congress-copy
        env:
          ALPACA_API_KEY:             ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET:          ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_BASE_URL:            ${{ secrets.ALPACA_BASE_URL }}
          DISCORD_CONGRESS_WEBHOOK:   ${{ secrets.DISCORD_CONGRESS_WEBHOOK }}
          DISCORD_ERRORS_WEBHOOK:     ${{ secrets.DISCORD_ERRORS_WEBHOOK }}
          DISCORD_ACTIONS_WEBHOOK:    ${{ secrets.DISCORD_ACTIONS_WEBHOOK }}
        run: python -m src.runner disclosures

      - name: Run monitor cycle (stop-loss check on open positions)
        working-directory: congress-copy
        env:
          ALPACA_API_KEY:             ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET:          ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_BASE_URL:            ${{ secrets.ALPACA_BASE_URL }}
          DISCORD_CONGRESS_WEBHOOK:   ${{ secrets.DISCORD_CONGRESS_WEBHOOK }}
          DISCORD_ERRORS_WEBHOOK:     ${{ secrets.DISCORD_ERRORS_WEBHOOK }}
          DISCORD_ACTIONS_WEBHOOK:    ${{ secrets.DISCORD_ACTIONS_WEBHOOK }}
        run: python -m src.runner monitor

      - name: Build congress state summary
        if: always()
        run: |
          # Summarize the SQLite DB into a small JSON payload for the dashboard.
          # Schema (see congress-copy/src/state.py): we have `positions`
          # (each row = a copy trade the bot placed; closed_at IS NULL means open)
          # and `events` (audit log). No `trades` / `open_positions` tables.
          # Fields: recent_copies (last 30 days of positions), open_positions, last_run.
          python - <<'PY'
          import json, sqlite3, os, datetime
          db_path = "congress-copy/data/state.db"
          summary = {"last_run": datetime.datetime.utcnow().isoformat() + "Z"}
          if os.path.exists(db_path):
              conn = sqlite3.connect(db_path)
              cur = conn.cursor()
              try:
                  cur.execute("""
                    SELECT symbol, qty, entry_price, opened_at, closed_at
                    FROM positions
                    WHERE opened_at >= datetime('now', '-30 days')
                    ORDER BY opened_at DESC LIMIT 50
                  """)
                  summary["recent_copies"] = [
                      {
                          "symbol": r[0],
                          "qty": r[1],
                          "entry_price": r[2],
                          "opened_at": r[3],
                          "status": "open" if r[4] is None else "closed",
                      }
                      for r in cur.fetchall()
                  ]
              except sqlite3.Error as e:
                  summary["error"] = f"positions query failed: {e}"
              try:
                  cur.execute("SELECT COUNT(*) FROM positions WHERE closed_at IS NULL")
                  summary["open_positions"] = cur.fetchone()[0]
              except sqlite3.Error:
                  summary["open_positions"] = None
              conn.close()
          else:
              summary["error"] = "state.db not present"
          with open("congress_summary.json", "w") as f:
              json.dump(summary, f)
          PY

      - name: Push congress summary to dashboard
        if: always()
        env:
          BOT_PUSH_TOKEN: ${{ secrets.BOT_PUSH_TOKEN }}
        run: |
          if [ -f congress_summary.json ]; then
            curl -fsS --max-time 10 \
              -X POST https://dash.fattieslearnscoding.com/api/bot-state \
              -H "Authorization: Bearer $BOT_PUSH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --slurpfile p congress_summary.json \
                         '{key: "bot:congress", payload: $p[0]}')" \
              || echo "Dashboard push for congress summary failed (non-fatal)"
          else
            echo "congress_summary.json not built — skipping dashboard push"
          fi

      - name: Commit state and logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add congress-copy/data/ congress-copy/logs/ logs/ || true
          if git diff --staged --quiet; then
            echo "No state or log changes to commit."
          else
            git commit -m "congress-copy: $(date -u +%Y-%m-%dT%H:%MZ)"
            for attempt in 1 2 3; do
              if git push; then
                echo "Pushed on attempt $attempt"
                exit 0
              fi
              echo "Push attempt $attempt failed — rebasing and retrying"
              git pull --rebase origin main
            done
            echo "Push failed after 3 attempts" >&2
            exit 1
          fi
