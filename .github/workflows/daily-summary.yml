name: Daily Summary

# Three-step daily summary: conservative summary → aggressive summary →
# head-to-head comparison. Each step posts an embed to its corresponding
# Discord channel, so the user sees three messages each afternoon:
#   1. Daily summary (conservative) → #daily-summary
#   2. Daily summary (aggressive)   → #aggressive-summary
#   3. Head-to-head comparison      → #daily-summary AND #aggressive-summary
#
# Triggered exclusively by cron-job.org via workflow_dispatch.

on:
  workflow_dispatch: {}

concurrency:
  group: bot-commits
  cancel-in-progress: false

jobs:
  summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Daily summary (conservative)
        env:
          ALPACA_API_KEY:           ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET:        ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_BASE_URL:          ${{ secrets.ALPACA_BASE_URL }}
          DISCORD_SUMMARY_WEBHOOK:  ${{ secrets.DISCORD_SUMMARY_WEBHOOK }}
          DISCORD_ERRORS_WEBHOOK:   ${{ secrets.DISCORD_ERRORS_WEBHOOK }}
          DISCORD_ACTIONS_WEBHOOK:  ${{ secrets.DISCORD_ACTIONS_WEBHOOK }}
        run: python daily_summary.py --mode conservative

      - name: Daily summary (aggressive)
        env:
          ALPACA_AGG_API_KEY:           ${{ secrets.ALPACA_AGG_API_KEY }}
          ALPACA_AGG_API_SECRET:        ${{ secrets.ALPACA_AGG_API_SECRET }}
          ALPACA_AGG_BASE_URL:          ${{ secrets.ALPACA_AGG_BASE_URL }}
          DISCORD_AGG_SUMMARY_WEBHOOK:  ${{ secrets.DISCORD_AGG_SUMMARY_WEBHOOK }}
          DISCORD_AGG_ERRORS_WEBHOOK:   ${{ secrets.DISCORD_AGG_ERRORS_WEBHOOK }}
          DISCORD_AGG_ACTIONS_WEBHOOK:  ${{ secrets.DISCORD_AGG_ACTIONS_WEBHOOK }}
        run: python daily_summary.py --mode aggressive

      - name: Head-to-head comparison
        # Pulls both accounts' equity, premiums, etc. and posts a
        # side-by-side embed to BOTH summary channels.
        env:
          ALPACA_API_KEY:               ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET:            ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_BASE_URL:              ${{ secrets.ALPACA_BASE_URL }}
          ALPACA_AGG_API_KEY:           ${{ secrets.ALPACA_AGG_API_KEY }}
          ALPACA_AGG_API_SECRET:        ${{ secrets.ALPACA_AGG_API_SECRET }}
          ALPACA_AGG_BASE_URL:          ${{ secrets.ALPACA_AGG_BASE_URL }}
          DISCORD_SUMMARY_WEBHOOK:      ${{ secrets.DISCORD_SUMMARY_WEBHOOK }}
          DISCORD_AGG_SUMMARY_WEBHOOK:  ${{ secrets.DISCORD_AGG_SUMMARY_WEBHOOK }}
          DISCORD_ERRORS_WEBHOOK:       ${{ secrets.DISCORD_ERRORS_WEBHOOK }}
          DISCORD_AGG_ERRORS_WEBHOOK:   ${{ secrets.DISCORD_AGG_ERRORS_WEBHOOK }}
          DISCORD_ACTIONS_WEBHOOK:      ${{ secrets.DISCORD_ACTIONS_WEBHOOK }}
          DISCORD_AGG_ACTIONS_WEBHOOK:  ${{ secrets.DISCORD_AGG_ACTIONS_WEBHOOK }}
        run: python daily_summary.py --head-to-head

      - name: Commit logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/ || true
          if git diff --staged --quiet; then
            echo "No log changes to commit."
          else
            git commit -m "daily-summary: $(date -u +%Y-%m-%dT%H:%MZ)"
            for attempt in 1 2 3; do
              if git push; then
                echo "Pushed on attempt $attempt"
                exit 0
              fi
              echo "Push attempt $attempt failed — rebasing and retrying"
              git pull --rebase origin main
            done
            echo "Push failed after 3 attempts" >&2
            exit 1
          fi
