name: Daily Summary

# Two-step daily summary: one per-mode summary per account. Each step posts an
# embed to its corresponding Discord channel:
#   1. Daily summary (manual) → #manual-summary
#   2. Daily summary (live)   → #live-summary (REAL MONEY)
#
# (The conservative/aggressive head-to-head and the sm500/sm1000/sm2000
# summaries were retired 2026-06-29 with those accounts.)
#
# Triggered exclusively by cron-job.org via workflow_dispatch.

on:
  workflow_dispatch: {}

concurrency:
  group: bot-commits
  cancel-in-progress: false

jobs:
  summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Daily summary (manual)
        env:
          ALPACA_MANUAL_API_KEY:           ${{ secrets.ALPACA_MANUAL_API_KEY }}
          ALPACA_MANUAL_API_SECRET:        ${{ secrets.ALPACA_MANUAL_API_SECRET }}
          ALPACA_MANUAL_BASE_URL:          ${{ secrets.ALPACA_MANUAL_BASE_URL }}
          DISCORD_MANUAL_SUMMARY_WEBHOOK:  ${{ secrets.DISCORD_MANUAL_SUMMARY_WEBHOOK }}
          DISCORD_MANUAL_ERRORS_WEBHOOK:   ${{ secrets.DISCORD_MANUAL_ERRORS_WEBHOOK }}
          DISCORD_MANUAL_ACTIONS_WEBHOOK:  ${{ secrets.DISCORD_MANUAL_ACTIONS_WEBHOOK }}
        run: python daily_summary.py --mode manual --reset-counters

      - name: Daily summary (live)
        env:
          ALPACA_LIVE_API_KEY:           ${{ secrets.ALPACA_LIVE_API_KEY }}
          ALPACA_LIVE_API_SECRET:        ${{ secrets.ALPACA_LIVE_API_SECRET }}
          ALPACA_LIVE_BASE_URL:          ${{ secrets.ALPACA_LIVE_BASE_URL }}
          DISCORD_LIVE_SUMMARY_WEBHOOK:  ${{ secrets.DISCORD_LIVE_SUMMARY_WEBHOOK }}
          DISCORD_LIVE_ERRORS_WEBHOOK:   ${{ secrets.DISCORD_LIVE_ERRORS_WEBHOOK }}
          DISCORD_LIVE_ACTIONS_WEBHOOK:  ${{ secrets.DISCORD_LIVE_ACTIONS_WEBHOOK }}
        run: python daily_summary.py --mode live --reset-counters

      - name: Commit logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/ || true
          # Glob wheel_state*.json so a missing live/manual file (e.g. before
          # the first cycle on a fresh account creates it) doesn't abort.
          git add wheel_state*.json || true
          if git diff --staged --quiet; then
            echo "No log changes to commit."
          else
            git commit -m "daily-summary: $(date -u +%Y-%m-%dT%H:%MZ)"
            for attempt in 1 2 3; do
              if git push; then
                echo "Pushed on attempt $attempt"
                exit 0
              fi
              echo "Push attempt $attempt failed — rebasing and retrying"
              # Stash any uncommitted changes so pull --rebase can proceed.
              # Concurrent bot workflows pushing state files to main during
              # this step can leave the working tree dirty in subtle ways
              # (line-ending normalization, stat-cache drift) that block
              # rebase. Pop afterwards so committed state stays intact.
              git stash --include-untracked --quiet || true
              if ! git pull --rebase origin main; then
                echo "Rebase failed on attempt $attempt"
                git rebase --abort 2>/dev/null || true
              fi
              git stash pop --quiet 2>/dev/null || true
            done
            echo "Push failed after 3 attempts" >&2
            exit 1
          fi
