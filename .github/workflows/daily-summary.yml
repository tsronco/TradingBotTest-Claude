name: Daily Summary

# Posts a combined end-of-day summary to #daily-summary covering TSLA stock,
# wheel, and congress-copy bot.
#
# Triggered exclusively by cron-job.org via workflow_dispatch.
# See tsla-monitor.yml for context on why we dropped the GitHub-native
# `schedule:` trigger.

on:
  workflow_dispatch: {}

concurrency:
  group: bot-commits
  cancel-in-progress: false

jobs:
  summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run combined daily summary
        env:
          ALPACA_API_KEY:           ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET:        ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_BASE_URL:          ${{ secrets.ALPACA_BASE_URL }}
          DISCORD_SUMMARY_WEBHOOK:  ${{ secrets.DISCORD_SUMMARY_WEBHOOK }}
          DISCORD_ERRORS_WEBHOOK:   ${{ secrets.DISCORD_ERRORS_WEBHOOK }}
          DISCORD_ACTIONS_WEBHOOK:  ${{ secrets.DISCORD_ACTIONS_WEBHOOK }}
        run: python daily_summary.py

      - name: Commit logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/ || true
          if git diff --staged --quiet; then
            echo "No log changes to commit."
          else
            git commit -m "daily-summary: $(date -u +%Y-%m-%dT%H:%MZ)"
            for attempt in 1 2 3; do
              if git push; then
                echo "Pushed on attempt $attempt"
                exit 0
              fi
              echo "Push attempt $attempt failed — rebasing and retrying"
              git pull --rebase origin main
            done
            echo "Push failed after 3 attempts" >&2
            exit 1
          fi
