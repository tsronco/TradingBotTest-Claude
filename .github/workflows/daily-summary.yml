name: Daily Summary

# Five-step daily summary: conservative → aggressive → manual → live →
# head-to-head comparison. Each step posts an embed to its corresponding
# Discord channel:
#   1. Daily summary (conservative) → #daily-summary
#   2. Daily summary (aggressive)   → #aggressive-summary
#   3. Daily summary (manual)       → #manual-summary  (no head-to-head)
#   4. Daily summary (live)         → #live-summary    (no head-to-head — real
#                                     money, separate capital base, separate
#                                     operating model from paper accounts)
#   5. Head-to-head comparison      → #daily-summary AND #aggressive-summary
#                                     (manual and live both excluded — different
#                                      starting capital and operating model)
#
# Triggered exclusively by cron-job.org via workflow_dispatch.

on:
  workflow_dispatch: {}

concurrency:
  group: bot-commits
  cancel-in-progress: false

jobs:
  summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Daily summary (conservative)
        env:
          ALPACA_API_KEY:           ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET:        ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_BASE_URL:          ${{ secrets.ALPACA_BASE_URL }}
          DISCORD_SUMMARY_WEBHOOK:  ${{ secrets.DISCORD_SUMMARY_WEBHOOK }}
          DISCORD_ERRORS_WEBHOOK:   ${{ secrets.DISCORD_ERRORS_WEBHOOK }}
          DISCORD_ACTIONS_WEBHOOK:  ${{ secrets.DISCORD_ACTIONS_WEBHOOK }}
        run: python daily_summary.py --mode conservative --reset-counters

      - name: Daily summary (aggressive)
        env:
          ALPACA_AGG_API_KEY:           ${{ secrets.ALPACA_AGG_API_KEY }}
          ALPACA_AGG_API_SECRET:        ${{ secrets.ALPACA_AGG_API_SECRET }}
          ALPACA_AGG_BASE_URL:          ${{ secrets.ALPACA_AGG_BASE_URL }}
          DISCORD_AGG_SUMMARY_WEBHOOK:  ${{ secrets.DISCORD_AGG_SUMMARY_WEBHOOK }}
          DISCORD_AGG_ERRORS_WEBHOOK:   ${{ secrets.DISCORD_AGG_ERRORS_WEBHOOK }}
          DISCORD_AGG_ACTIONS_WEBHOOK:  ${{ secrets.DISCORD_AGG_ACTIONS_WEBHOOK }}
        run: python daily_summary.py --mode aggressive --reset-counters

      - name: Daily summary (manual)
        env:
          ALPACA_MANUAL_API_KEY:           ${{ secrets.ALPACA_MANUAL_API_KEY }}
          ALPACA_MANUAL_API_SECRET:        ${{ secrets.ALPACA_MANUAL_API_SECRET }}
          ALPACA_MANUAL_BASE_URL:          ${{ secrets.ALPACA_MANUAL_BASE_URL }}
          DISCORD_MANUAL_SUMMARY_WEBHOOK:  ${{ secrets.DISCORD_MANUAL_SUMMARY_WEBHOOK }}
          DISCORD_MANUAL_ERRORS_WEBHOOK:   ${{ secrets.DISCORD_MANUAL_ERRORS_WEBHOOK }}
          DISCORD_MANUAL_ACTIONS_WEBHOOK:  ${{ secrets.DISCORD_MANUAL_ACTIONS_WEBHOOK }}
        run: python daily_summary.py --mode manual --reset-counters

      - name: Daily summary (live)
        env:
          ALPACA_LIVE_API_KEY:           ${{ secrets.ALPACA_LIVE_API_KEY }}
          ALPACA_LIVE_API_SECRET:        ${{ secrets.ALPACA_LIVE_API_SECRET }}
          ALPACA_LIVE_BASE_URL:          ${{ secrets.ALPACA_LIVE_BASE_URL }}
          DISCORD_LIVE_SUMMARY_WEBHOOK:  ${{ secrets.DISCORD_LIVE_SUMMARY_WEBHOOK }}
          DISCORD_LIVE_ERRORS_WEBHOOK:   ${{ secrets.DISCORD_LIVE_ERRORS_WEBHOOK }}
          DISCORD_LIVE_ACTIONS_WEBHOOK:  ${{ secrets.DISCORD_LIVE_ACTIONS_WEBHOOK }}
        run: python daily_summary.py --mode live --reset-counters

      - name: Head-to-head comparison
        # Pulls both accounts' equity, premiums, etc. and posts a
        # side-by-side embed to BOTH summary channels.
        env:
          ALPACA_API_KEY:               ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET:            ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_BASE_URL:              ${{ secrets.ALPACA_BASE_URL }}
          ALPACA_AGG_API_KEY:           ${{ secrets.ALPACA_AGG_API_KEY }}
          ALPACA_AGG_API_SECRET:        ${{ secrets.ALPACA_AGG_API_SECRET }}
          ALPACA_AGG_BASE_URL:          ${{ secrets.ALPACA_AGG_BASE_URL }}
          DISCORD_SUMMARY_WEBHOOK:      ${{ secrets.DISCORD_SUMMARY_WEBHOOK }}
          DISCORD_AGG_SUMMARY_WEBHOOK:  ${{ secrets.DISCORD_AGG_SUMMARY_WEBHOOK }}
          DISCORD_ERRORS_WEBHOOK:       ${{ secrets.DISCORD_ERRORS_WEBHOOK }}
          DISCORD_AGG_ERRORS_WEBHOOK:   ${{ secrets.DISCORD_AGG_ERRORS_WEBHOOK }}
          DISCORD_ACTIONS_WEBHOOK:      ${{ secrets.DISCORD_ACTIONS_WEBHOOK }}
          DISCORD_AGG_ACTIONS_WEBHOOK:  ${{ secrets.DISCORD_AGG_ACTIONS_WEBHOOK }}
        run: python daily_summary.py --head-to-head

      - name: Commit logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/ || true
          git add wheel_state.json wheel_state_aggressive.json wheel_state_manual.json wheel_state_live.json || true
          if git diff --staged --quiet; then
            echo "No log changes to commit."
          else
            git commit -m "daily-summary: $(date -u +%Y-%m-%dT%H:%MZ)"
            for attempt in 1 2 3; do
              if git push; then
                echo "Pushed on attempt $attempt"
                exit 0
              fi
              echo "Push attempt $attempt failed — rebasing and retrying"
              git pull --rebase origin main
            done
            echo "Push failed after 3 attempts" >&2
            exit 1
          fi
