name: TSLA Monitor (Aggressive)

# Mirror of tsla-monitor.yml that runs the same scripts in --mode aggressive
# against the second paper account (ALPACA_AGG_*) and posts to the
# #aggressive-* Discord channels.
#
# Triggered exclusively by cron-job.org via workflow_dispatch on the same
# every-10-minute schedule as the conservative monitor. Both share the
# `bot-commits` concurrency group so state-file commits never race.

on:
  workflow_dispatch: {}  # cron-job.org calls this; also allows manual trigger

concurrency:
  group: bot-commits
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run TSLA strategy (aggressive — trailing stop / ladder)
        env:
          ALPACA_AGG_API_KEY:           ${{ secrets.ALPACA_AGG_API_KEY }}
          ALPACA_AGG_API_SECRET:        ${{ secrets.ALPACA_AGG_API_SECRET }}
          ALPACA_AGG_BASE_URL:          ${{ secrets.ALPACA_AGG_BASE_URL }}
          DISCORD_AGG_TRADES_WEBHOOK:   ${{ secrets.DISCORD_AGG_TRADES_WEBHOOK }}
          DISCORD_AGG_ERRORS_WEBHOOK:   ${{ secrets.DISCORD_AGG_ERRORS_WEBHOOK }}
          DISCORD_AGG_ACTIONS_WEBHOOK:  ${{ secrets.DISCORD_AGG_ACTIONS_WEBHOOK }}
        run: python strategy.py --mode aggressive once

      - name: Run wheel strategy (aggressive)
        env:
          ALPACA_AGG_API_KEY:           ${{ secrets.ALPACA_AGG_API_KEY }}
          ALPACA_AGG_API_SECRET:        ${{ secrets.ALPACA_AGG_API_SECRET }}
          ALPACA_AGG_BASE_URL:          ${{ secrets.ALPACA_AGG_BASE_URL }}
          DISCORD_AGG_TRADES_WEBHOOK:   ${{ secrets.DISCORD_AGG_TRADES_WEBHOOK }}
          DISCORD_AGG_ERRORS_WEBHOOK:   ${{ secrets.DISCORD_AGG_ERRORS_WEBHOOK }}
          DISCORD_AGG_ACTIONS_WEBHOOK:  ${{ secrets.DISCORD_AGG_ACTIONS_WEBHOOK }}
        run: python wheel_strategy.py --mode aggressive once

      - name: Run long-options manager (aggressive)
        env:
          ALPACA_AGG_API_KEY:           ${{ secrets.ALPACA_AGG_API_KEY }}
          ALPACA_AGG_API_SECRET:        ${{ secrets.ALPACA_AGG_API_SECRET }}
          ALPACA_AGG_BASE_URL:          ${{ secrets.ALPACA_AGG_BASE_URL }}
          DISCORD_AGG_TRADES_WEBHOOK:   ${{ secrets.DISCORD_AGG_TRADES_WEBHOOK }}
          DISCORD_AGG_ERRORS_WEBHOOK:   ${{ secrets.DISCORD_AGG_ERRORS_WEBHOOK }}
          DISCORD_AGG_ACTIONS_WEBHOOK:  ${{ secrets.DISCORD_AGG_ACTIONS_WEBHOOK }}
        run: python long_options_strategy.py --mode aggressive once

      - name: Push wheel state (aggressive) to dashboard
        if: always()
        env:
          BOT_PUSH_TOKEN: ${{ secrets.BOT_PUSH_TOKEN }}
        run: |
          if [ -f wheel_state_aggressive.json ]; then
            curl -fsS --max-time 10 \
              -X POST https://dash.fattieslearnscoding.com/api/bot-state \
              -H "Authorization: Bearer $BOT_PUSH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --slurpfile p wheel_state_aggressive.json \
                         '{key: "bot:state:aggressive", payload: $p[0]}')" \
              || echo "Dashboard push for aggressive wheel state failed (non-fatal)"
          else
            echo "wheel_state_aggressive.json not present — skipping dashboard push"
          fi

      - name: Push strategy state (aggressive) to dashboard
        if: always()
        env:
          BOT_PUSH_TOKEN: ${{ secrets.BOT_PUSH_TOKEN }}
        run: |
          if [ -f strategy_state_aggressive.json ]; then
            curl -fsS --max-time 10 \
              -X POST https://dash.fattieslearnscoding.com/api/bot-state \
              -H "Authorization: Bearer $BOT_PUSH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --slurpfile p strategy_state_aggressive.json \
                         '{key: "bot:strategy:aggressive", payload: $p[0]}')" \
              || echo "Dashboard push for aggressive strategy state failed (non-fatal)"
          else
            echo "strategy_state_aggressive.json not present — skipping dashboard push"
          fi

      - name: Commit state and logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Add each pathspec INDEPENDENTLY so a missing file doesn't abort
          # the whole `git add`. (Git aborts atomically on missing pathspec
          # even with `|| true` at the end of the line, which silently
          # leaves other changes unstaged.) strategy_state_aggressive.json
          # in particular won't exist until the aggressive TSLA position
          # is seeded; before that, strategy.py exits without writing it.
          git add strategy_state_aggressive.json 2>/dev/null || true
          git add wheel_state_aggressive.json 2>/dev/null || true
          git add logs/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No state or log changes to commit."
          else
            git commit -m "tsla-monitor-aggressive: $(date -u +%Y-%m-%dT%H:%MZ)"
            for attempt in 1 2 3; do
              if git push; then
                echo "Pushed on attempt $attempt"
                exit 0
              fi
              echo "Push attempt $attempt failed — rebasing and retrying"
              git pull --rebase origin main
            done
            echo "Push failed after 3 attempts" >&2
            exit 1
          fi
