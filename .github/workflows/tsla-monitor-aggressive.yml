name: TSLA Monitor (Aggressive)

# Mirror of tsla-monitor.yml that runs the same scripts in --mode aggressive
# against the second paper account (ALPACA_AGG_*) and posts to the
# #aggressive-* Discord channels.
#
# Triggered exclusively by cron-job.org via workflow_dispatch on the same
# every-10-minute schedule as the conservative monitor. Both share the
# `bot-commits` concurrency group so state-file commits never race.

on:
  workflow_dispatch: {}  # cron-job.org calls this; also allows manual trigger

concurrency:
  group: bot-commits
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run TSLA strategy (aggressive — trailing stop / ladder)
        env:
          ALPACA_AGG_API_KEY:           ${{ secrets.ALPACA_AGG_API_KEY }}
          ALPACA_AGG_API_SECRET:        ${{ secrets.ALPACA_AGG_API_SECRET }}
          ALPACA_AGG_BASE_URL:          ${{ secrets.ALPACA_AGG_BASE_URL }}
          DISCORD_AGG_TRADES_WEBHOOK:   ${{ secrets.DISCORD_AGG_TRADES_WEBHOOK }}
          DISCORD_AGG_ERRORS_WEBHOOK:   ${{ secrets.DISCORD_AGG_ERRORS_WEBHOOK }}
          DISCORD_AGG_ACTIONS_WEBHOOK:  ${{ secrets.DISCORD_AGG_ACTIONS_WEBHOOK }}
        run: python strategy.py --mode aggressive once

      - name: Run wheel strategy (aggressive)
        env:
          ALPACA_AGG_API_KEY:           ${{ secrets.ALPACA_AGG_API_KEY }}
          ALPACA_AGG_API_SECRET:        ${{ secrets.ALPACA_AGG_API_SECRET }}
          ALPACA_AGG_BASE_URL:          ${{ secrets.ALPACA_AGG_BASE_URL }}
          DISCORD_AGG_TRADES_WEBHOOK:   ${{ secrets.DISCORD_AGG_TRADES_WEBHOOK }}
          DISCORD_AGG_ERRORS_WEBHOOK:   ${{ secrets.DISCORD_AGG_ERRORS_WEBHOOK }}
          DISCORD_AGG_ACTIONS_WEBHOOK:  ${{ secrets.DISCORD_AGG_ACTIONS_WEBHOOK }}
        run: python wheel_strategy.py --mode aggressive once

      - name: Run long-options manager (aggressive)
        env:
          ALPACA_AGG_API_KEY:           ${{ secrets.ALPACA_AGG_API_KEY }}
          ALPACA_AGG_API_SECRET:        ${{ secrets.ALPACA_AGG_API_SECRET }}
          ALPACA_AGG_BASE_URL:          ${{ secrets.ALPACA_AGG_BASE_URL }}
          DISCORD_AGG_TRADES_WEBHOOK:   ${{ secrets.DISCORD_AGG_TRADES_WEBHOOK }}
          DISCORD_AGG_ERRORS_WEBHOOK:   ${{ secrets.DISCORD_AGG_ERRORS_WEBHOOK }}
          DISCORD_AGG_ACTIONS_WEBHOOK:  ${{ secrets.DISCORD_AGG_ACTIONS_WEBHOOK }}
        run: python long_options_strategy.py --mode aggressive once

      - name: Commit state and logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add strategy_state_aggressive.json wheel_state_aggressive.json logs/ || true
          if git diff --staged --quiet; then
            echo "No state or log changes to commit."
          else
            git commit -m "tsla-monitor-aggressive: $(date -u +%Y-%m-%dT%H:%MZ)"
            for attempt in 1 2 3; do
              if git push; then
                echo "Pushed on attempt $attempt"
                exit 0
              fi
              echo "Push attempt $attempt failed — rebasing and retrying"
              git pull --rebase origin main
            done
            echo "Push failed after 3 attempts" >&2
            exit 1
          fi
