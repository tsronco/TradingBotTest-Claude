name: TSLA Monitor (Manual)

# Mirror of tsla-monitor.yml that runs the same scripts in --mode manual
# against the third paper account (ALPACA_MANUAL_*) and posts to the
# #manual-* Discord channels.
#
# Manual mode auto-discovers symbols from live Alpaca positions instead of
# iterating a static list, and the wheel skips Stage 1 put entry — the user
# opens trades by hand and the bot manages them (trail/ladder/stop on stocks,
# 50% close on existing puts, covered call sale on assignment).
#
# Triggered exclusively by cron-job.org via workflow_dispatch on the same
# every-10-minute schedule as the conservative/aggressive monitors. All three
# share the `bot-commits` concurrency group so state-file commits never race.

on:
  workflow_dispatch: {}  # cron-job.org calls this; also allows manual trigger

concurrency:
  group: bot-commits
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run strategy (manual — multi-stock trail/ladder/stop)
        env:
          ALPACA_MANUAL_API_KEY:           ${{ secrets.ALPACA_MANUAL_API_KEY }}
          ALPACA_MANUAL_API_SECRET:        ${{ secrets.ALPACA_MANUAL_API_SECRET }}
          ALPACA_MANUAL_BASE_URL:          ${{ secrets.ALPACA_MANUAL_BASE_URL }}
          DISCORD_MANUAL_TRADES_WEBHOOK:   ${{ secrets.DISCORD_MANUAL_TRADES_WEBHOOK }}
          DISCORD_MANUAL_ERRORS_WEBHOOK:   ${{ secrets.DISCORD_MANUAL_ERRORS_WEBHOOK }}
          DISCORD_MANUAL_ACTIONS_WEBHOOK:  ${{ secrets.DISCORD_MANUAL_ACTIONS_WEBHOOK }}
        run: python strategy.py --mode manual once

      - name: Run wheel strategy (manual — manage existing, skip new puts)
        env:
          ALPACA_MANUAL_API_KEY:           ${{ secrets.ALPACA_MANUAL_API_KEY }}
          ALPACA_MANUAL_API_SECRET:        ${{ secrets.ALPACA_MANUAL_API_SECRET }}
          ALPACA_MANUAL_BASE_URL:          ${{ secrets.ALPACA_MANUAL_BASE_URL }}
          DISCORD_MANUAL_TRADES_WEBHOOK:   ${{ secrets.DISCORD_MANUAL_TRADES_WEBHOOK }}
          DISCORD_MANUAL_ERRORS_WEBHOOK:   ${{ secrets.DISCORD_MANUAL_ERRORS_WEBHOOK }}
          DISCORD_MANUAL_ACTIONS_WEBHOOK:  ${{ secrets.DISCORD_MANUAL_ACTIONS_WEBHOOK }}
        run: python wheel_strategy.py --mode manual once

      - name: Run long-options manager (manual)
        env:
          ALPACA_MANUAL_API_KEY:           ${{ secrets.ALPACA_MANUAL_API_KEY }}
          ALPACA_MANUAL_API_SECRET:        ${{ secrets.ALPACA_MANUAL_API_SECRET }}
          ALPACA_MANUAL_BASE_URL:          ${{ secrets.ALPACA_MANUAL_BASE_URL }}
          DISCORD_MANUAL_TRADES_WEBHOOK:   ${{ secrets.DISCORD_MANUAL_TRADES_WEBHOOK }}
          DISCORD_MANUAL_ERRORS_WEBHOOK:   ${{ secrets.DISCORD_MANUAL_ERRORS_WEBHOOK }}
          DISCORD_MANUAL_ACTIONS_WEBHOOK:  ${{ secrets.DISCORD_MANUAL_ACTIONS_WEBHOOK }}
        run: python long_options_strategy.py --mode manual once

      - name: Push wheel state (manual) to dashboard
        if: always()
        env:
          BOT_PUSH_TOKEN: ${{ secrets.BOT_PUSH_TOKEN }}
        run: |
          if [ -f wheel_state_manual.json ]; then
            curl -fsS --max-time 10 \
              -X POST https://tradingbot-dashboard-blue.vercel.app/api/bot-state \
              -H "Authorization: Bearer $BOT_PUSH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --slurpfile p wheel_state_manual.json \
                         '{key: "bot:state:manual", payload: $p[0]}')" \
              || echo "Dashboard push for manual wheel state failed (non-fatal)"
          else
            echo "wheel_state_manual.json not present — skipping dashboard push"
          fi

      - name: Push strategy state (manual) to dashboard
        if: always()
        env:
          BOT_PUSH_TOKEN: ${{ secrets.BOT_PUSH_TOKEN }}
        run: |
          if [ -f strategy_state_manual.json ]; then
            curl -fsS --max-time 10 \
              -X POST https://tradingbot-dashboard-blue.vercel.app/api/bot-state \
              -H "Authorization: Bearer $BOT_PUSH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --slurpfile p strategy_state_manual.json \
                         '{key: "bot:strategy:manual", payload: $p[0]}')" \
              || echo "Dashboard push for manual strategy state failed (non-fatal)"
          else
            echo "strategy_state_manual.json not present — skipping dashboard push"
          fi

      - name: Commit state and logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Add each pathspec INDEPENDENTLY so a missing file doesn't abort
          # the whole `git add`. strategy_state_manual.json and
          # wheel_state_manual.json may not exist on the very first run
          # before any positions are held.
          git add strategy_state_manual.json 2>/dev/null || true
          git add wheel_state_manual.json 2>/dev/null || true
          git add logs/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No state or log changes to commit."
          else
            git commit -m "tsla-monitor-manual: $(date -u +%Y-%m-%dT%H:%MZ)"
            for attempt in 1 2 3; do
              if git push; then
                echo "Pushed on attempt $attempt"
                exit 0
              fi
              echo "Push attempt $attempt failed — rebasing and retrying"
              git pull --rebase origin main
            done
            echo "Push failed after 3 attempts" >&2
            exit 1
          fi
