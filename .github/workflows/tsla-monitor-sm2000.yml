name: SM2000 Monitor

# Mirror of tsla-monitor-manual.yml that runs the same scripts in --mode sm2000
# against the SM2000 small-account paper account (ALPACA_SM2000_*) and posts to
# the #sm2000_* Discord channels.
#
# SM2000 mode auto-discovers symbols from live Alpaca positions instead of
# iterating a static list, and the wheel skips Stage 1 put entry — the user
# opens trades by hand and the bot manages them (trail/ladder/stop on stocks,
# 50% close on existing puts, covered call sale on assignment). Additionally,
# the wheel autonomously opens earnings-screened put credit spreads when buying
# power is below the bp_switch_threshold (auto_open_spreads=True).
#
# Triggered exclusively by cron-job.org via workflow_dispatch on the every-10-
# minute schedule with a :06 minute offset. All accounts share the `bot-commits`
# concurrency group so state-file commits never race.

on:
  workflow_dispatch: {}  # cron-job.org calls this; also allows manual trigger

concurrency:
  group: bot-commits
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run strategy (sm2000 — multi-stock trail/ladder/stop)
        env:
          ALPACA_SM2000_API_KEY:           ${{ secrets.ALPACA_SM2000_API_KEY }}
          ALPACA_SM2000_API_SECRET:        ${{ secrets.ALPACA_SM2000_API_SECRET }}
          ALPACA_SM2000_BASE_URL:          ${{ secrets.ALPACA_SM2000_BASE_URL }}
          DISCORD_SM2000_TRADES_WEBHOOK:   ${{ secrets.DISCORD_SM2000_TRADES_WEBHOOK }}
          DISCORD_SM2000_ERRORS_WEBHOOK:   ${{ secrets.DISCORD_SM2000_ERRORS_WEBHOOK }}
          DISCORD_SM2000_ACTIONS_WEBHOOK:  ${{ secrets.DISCORD_SM2000_ACTIONS_WEBHOOK }}
        run: python strategy.py --mode sm2000 once

      - name: Run wheel strategy (sm2000 — manage existing, auto-open spreads)
        env:
          ALPACA_SM2000_API_KEY:           ${{ secrets.ALPACA_SM2000_API_KEY }}
          ALPACA_SM2000_API_SECRET:        ${{ secrets.ALPACA_SM2000_API_SECRET }}
          ALPACA_SM2000_BASE_URL:          ${{ secrets.ALPACA_SM2000_BASE_URL }}
          DISCORD_SM2000_TRADES_WEBHOOK:   ${{ secrets.DISCORD_SM2000_TRADES_WEBHOOK }}
          DISCORD_SM2000_ERRORS_WEBHOOK:   ${{ secrets.DISCORD_SM2000_ERRORS_WEBHOOK }}
          DISCORD_SM2000_ACTIONS_WEBHOOK:  ${{ secrets.DISCORD_SM2000_ACTIONS_WEBHOOK }}
        run: python wheel_strategy.py --mode sm2000 once

      - name: Run long-options manager (sm2000)
        env:
          ALPACA_SM2000_API_KEY:           ${{ secrets.ALPACA_SM2000_API_KEY }}
          ALPACA_SM2000_API_SECRET:        ${{ secrets.ALPACA_SM2000_API_SECRET }}
          ALPACA_SM2000_BASE_URL:          ${{ secrets.ALPACA_SM2000_BASE_URL }}
          DISCORD_SM2000_TRADES_WEBHOOK:   ${{ secrets.DISCORD_SM2000_TRADES_WEBHOOK }}
          DISCORD_SM2000_ERRORS_WEBHOOK:   ${{ secrets.DISCORD_SM2000_ERRORS_WEBHOOK }}
          DISCORD_SM2000_ACTIONS_WEBHOOK:  ${{ secrets.DISCORD_SM2000_ACTIONS_WEBHOOK }}
        run: python long_options_strategy.py --mode sm2000 once

      - name: Push wheel state (sm2000) to dashboard
        if: always()
        env:
          BOT_PUSH_TOKEN: ${{ secrets.BOT_PUSH_TOKEN }}
        run: |
          if [ -f wheel_state_sm2000.json ]; then
            curl -fsS --max-time 10 \
              -X POST https://tradingbot-dashboard-blue.vercel.app/api/bot-state \
              -H "Authorization: Bearer $BOT_PUSH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --slurpfile p wheel_state_sm2000.json \
                         '{key: "bot:state:sm2000", payload: $p[0]}')" \
              || echo "Dashboard push for sm2000 wheel state failed (non-fatal)"
          else
            echo "wheel_state_sm2000.json not present — skipping dashboard push"
          fi

      - name: Push strategy state (sm2000) to dashboard
        if: always()
        env:
          BOT_PUSH_TOKEN: ${{ secrets.BOT_PUSH_TOKEN }}
        run: |
          if [ -f strategy_state_sm2000.json ]; then
            curl -fsS --max-time 10 \
              -X POST https://tradingbot-dashboard-blue.vercel.app/api/bot-state \
              -H "Authorization: Bearer $BOT_PUSH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --slurpfile p strategy_state_sm2000.json \
                         '{key: "bot:strategy:sm2000", payload: $p[0]}')" \
              || echo "Dashboard push for sm2000 strategy state failed (non-fatal)"
          else
            echo "strategy_state_sm2000.json not present — skipping dashboard push"
          fi

      - name: Push rules to dashboard
        if: always()
        env:
          BOT_PUSH_TOKEN: ${{ secrets.BOT_PUSH_TOKEN }}
          DASHBOARD_URL: https://tradingbot-dashboard-blue.vercel.app
        run: |
          python tools/push_rules_to_dashboard.py --mode sm2000 \
            || echo "Dashboard push for rules failed (non-fatal)"

      - name: Commit state and logs
        # Run even when an earlier script step failed so the JSONL log
        # entry (incl. any exception trace) lands in git. Without this,
        # a strategy.py crash silently swallows the diagnostic — Discord
        # gets the error but we have no JSONL record to inspect.
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Add each pathspec INDEPENDENTLY so a missing file doesn't abort
          # the whole `git add`. strategy_state_sm2000.json and
          # wheel_state_sm2000.json may not exist on the very first run
          # before any positions are held.
          git add strategy_state_sm2000.json 2>/dev/null || true
          git add wheel_state_sm2000.json 2>/dev/null || true
          git add logs/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No state or log changes to commit."
          else
            git commit -m "tsla-monitor-sm2000: $(date -u +%Y-%m-%dT%H:%MZ)"
            for attempt in 1 2 3; do
              if git push; then
                echo "Pushed on attempt $attempt"
                exit 0
              fi
              echo "Push attempt $attempt failed — rebasing and retrying"
              git pull --rebase origin main
            done
            echo "Push failed after 3 attempts" >&2
            exit 1
          fi
