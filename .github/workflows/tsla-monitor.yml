name: TSLA Monitor

# Runs strategy.py (trailing stop / ladder) + wheel_strategy.py (puts/calls).
#
# Triggered exclusively by cron-job.org via workflow_dispatch.
# We removed the GitHub-native `schedule:` trigger after a duplicate-scheduler
# race condition caused merge conflicts on state file commits when both
# schedulers fired simultaneously. cron-job.org is fully reliable; GitHub's
# native cron has been unreliable on this repo and isn't needed.

on:
  workflow_dispatch: {}  # cron-job.org calls this; also allows manual trigger from Actions tab

# Serialize ALL bot workflow runs to avoid push conflicts when committing
# state/log files back to the repo.
concurrency:
  group: bot-commits
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run TSLA strategy (trailing stop / ladder)
        env:
          ALPACA_API_KEY:           ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET:        ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_BASE_URL:          ${{ secrets.ALPACA_BASE_URL }}
          DISCORD_TSLA_WEBHOOK:     ${{ secrets.DISCORD_TSLA_WEBHOOK }}
          DISCORD_ERRORS_WEBHOOK:   ${{ secrets.DISCORD_ERRORS_WEBHOOK }}
          DISCORD_ACTIONS_WEBHOOK:  ${{ secrets.DISCORD_ACTIONS_WEBHOOK }}
        run: python strategy.py once

      - name: Run TSLA wheel strategy
        env:
          ALPACA_API_KEY:           ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET:        ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_BASE_URL:          ${{ secrets.ALPACA_BASE_URL }}
          DISCORD_TSLA_WEBHOOK:     ${{ secrets.DISCORD_TSLA_WEBHOOK }}
          DISCORD_ERRORS_WEBHOOK:   ${{ secrets.DISCORD_ERRORS_WEBHOOK }}
          DISCORD_ACTIONS_WEBHOOK:  ${{ secrets.DISCORD_ACTIONS_WEBHOOK }}
        run: python wheel_strategy.py once

      - name: Run long-options manager (any long calls/puts in account)
        env:
          ALPACA_API_KEY:           ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET:        ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_BASE_URL:          ${{ secrets.ALPACA_BASE_URL }}
          DISCORD_TSLA_WEBHOOK:     ${{ secrets.DISCORD_TSLA_WEBHOOK }}
          DISCORD_ERRORS_WEBHOOK:   ${{ secrets.DISCORD_ERRORS_WEBHOOK }}
          DISCORD_ACTIONS_WEBHOOK:  ${{ secrets.DISCORD_ACTIONS_WEBHOOK }}
        run: python long_options_strategy.py once

      - name: Push wheel state to dashboard
        if: always()
        env:
          BOT_PUSH_TOKEN: ${{ secrets.BOT_PUSH_TOKEN }}
        run: |
          if [ -f wheel_state.json ]; then
            curl -fsS --max-time 10 \
              -X POST https://tradingbot-dashboard-blue.vercel.app/api/bot-state \
              -H "Authorization: Bearer $BOT_PUSH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --slurpfile p wheel_state.json \
                         '{key: "bot:state:conservative", payload: $p[0]}')" \
              || echo "Dashboard push for wheel state failed (non-fatal)"
          else
            echo "wheel_state.json not present — skipping dashboard push"
          fi

      - name: Push strategy state to dashboard
        if: always()
        env:
          BOT_PUSH_TOKEN: ${{ secrets.BOT_PUSH_TOKEN }}
        run: |
          if [ -f strategy_state.json ]; then
            curl -fsS --max-time 10 \
              -X POST https://tradingbot-dashboard-blue.vercel.app/api/bot-state \
              -H "Authorization: Bearer $BOT_PUSH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --slurpfile p strategy_state.json \
                         '{key: "bot:strategy:conservative", payload: $p[0]}')" \
              || echo "Dashboard push for strategy state failed (non-fatal)"
          else
            echo "strategy_state.json not present — skipping dashboard push"
          fi

      - name: Push rules to dashboard
        if: always()
        env:
          BOT_PUSH_TOKEN: ${{ secrets.BOT_PUSH_TOKEN }}
          DASHBOARD_URL: https://tradingbot-dashboard-blue.vercel.app
        run: |
          python tools/push_rules_to_dashboard.py --mode conservative \
            || echo "Dashboard push for rules failed (non-fatal)"

      - name: Commit state and logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Add each pathspec independently so a missing file doesn't abort
          # the whole `git add` (atomic-fail behavior with multiple pathspecs).
          git add strategy_state.json 2>/dev/null || true
          git add wheel_state.json 2>/dev/null || true
          git add logs/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No state or log changes to commit."
          else
            git commit -m "tsla-monitor: $(date -u +%Y-%m-%dT%H:%MZ)"
            # Retry push up to 3 times in case another workflow pushed first.
            for attempt in 1 2 3; do
              if git push; then
                echo "Pushed on attempt $attempt"
                exit 0
              fi
              echo "Push attempt $attempt failed — rebasing and retrying"
              git pull --rebase origin main
            done
            echo "Push failed after 3 attempts" >&2
            exit 1
          fi
