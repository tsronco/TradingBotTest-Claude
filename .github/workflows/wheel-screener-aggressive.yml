name: Wheel Screener (Aggressive)

# Mirror of wheel-screener.yml in --mode aggressive: scans the higher-IV
# universe (crypto-adjacent, EV, China tech, meme, etc.) and posts the
# weekly digest to #aggressive-summary.
#
# Triggered by cron-job.org on Sundays 22:00 UTC, same slot as the
# conservative screener.

on:
  workflow_dispatch: {}

concurrency:
  group: bot-commits
  cancel-in-progress: false

jobs:
  screen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run wheel screener (aggressive)
        env:
          ALPACA_AGG_API_KEY:           ${{ secrets.ALPACA_AGG_API_KEY }}
          ALPACA_AGG_API_SECRET:        ${{ secrets.ALPACA_AGG_API_SECRET }}
          ALPACA_AGG_BASE_URL:          ${{ secrets.ALPACA_AGG_BASE_URL }}
          DISCORD_AGG_SUMMARY_WEBHOOK:  ${{ secrets.DISCORD_AGG_SUMMARY_WEBHOOK }}
          DISCORD_AGG_TRADES_WEBHOOK:   ${{ secrets.DISCORD_AGG_TRADES_WEBHOOK }}
          DISCORD_AGG_ERRORS_WEBHOOK:   ${{ secrets.DISCORD_AGG_ERRORS_WEBHOOK }}
          DISCORD_AGG_ACTIONS_WEBHOOK:  ${{ secrets.DISCORD_AGG_ACTIONS_WEBHOOK }}
        run: python wheel_screener.py --mode aggressive

      - name: Commit logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/ || true
          if git diff --staged --quiet; then
            echo "No log changes to commit."
          else
            git commit -m "wheel-screener-aggressive: $(date -u +%Y-%m-%dT%H:%MZ)"
            for attempt in 1 2 3; do
              if git push; then
                echo "Pushed on attempt $attempt"
                exit 0
              fi
              echo "Push attempt $attempt failed — rebasing and retrying"
              git pull --rebase origin main
            done
            echo "Push failed after 3 attempts" >&2
            exit 1
          fi
