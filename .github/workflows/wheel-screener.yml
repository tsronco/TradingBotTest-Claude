name: Wheel Screener

# Runs wheel_screener.py once per week to post a Discord digest of the best
# wheel candidates from a curated universe. Triggered exclusively by
# cron-job.org via workflow_dispatch.
#
# Uses the same Sunday-evening firing convention as a "set up the week"
# notification — gives Tim a few hours to review candidates before Monday open.

on:
  workflow_dispatch: {}  # cron-job.org calls this; also allows manual trigger

# Same concurrency group as the other workflows so state-file commits never race.
concurrency:
  group: bot-commits
  cancel-in-progress: false

jobs:
  screen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run wheel screener
        env:
          ALPACA_API_KEY:           ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET:        ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_BASE_URL:          ${{ secrets.ALPACA_BASE_URL }}
          DISCORD_SUMMARY_WEBHOOK:  ${{ secrets.DISCORD_SUMMARY_WEBHOOK }}
          DISCORD_TSLA_WEBHOOK:     ${{ secrets.DISCORD_TSLA_WEBHOOK }}
          DISCORD_ERRORS_WEBHOOK:   ${{ secrets.DISCORD_ERRORS_WEBHOOK }}
          DISCORD_ACTIONS_WEBHOOK:  ${{ secrets.DISCORD_ACTIONS_WEBHOOK }}
        run: python wheel_screener.py

      - name: Commit logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/ || true
          if git diff --staged --quiet; then
            echo "No log changes to commit."
          else
            git commit -m "wheel-screener: $(date -u +%Y-%m-%dT%H:%MZ)"
            for attempt in 1 2 3; do
              if git push; then
                echo "Pushed on attempt $attempt"
                exit 0
              fi
              echo "Push attempt $attempt failed — rebasing and retrying"
              git pull --rebase origin main
            done
            echo "Push failed after 3 attempts" >&2
            exit 1
          fi
